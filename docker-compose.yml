version: '3.8'

services:
  # Service 1: The Database
  db:
    image: mysql:8.0
    container_name: sakila-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    networks:
      - sakila-network
    volumes:
      - sakila-db-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service 2: The Flask App
  app:
    build: .
    container_name: sakila-app
    restart: on-failure
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy

  # Service 3: Database Admin UI
  db-admin:
    image: adminer:latest
    container_name: sakila-adminer
    ports:
      - "8080:8080"
    networks:
      - sakila-network
    depends_on:
      - db

  # Service 4: Test Runner (On-demand only)
  test-runner:
    build: .
    profiles:
      - test
    command: python -m pytest tests/ -v
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data: